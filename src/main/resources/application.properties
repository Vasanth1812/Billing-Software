spring.application.name=Billing-System

# PostgreSQL DataSource
spring.datasource.url=jdbc:postgresql://localhost:5432/billing_db
spring.datasource.username=postgres
spring.datasource.password=root


#spring.datasource.url=${SPRING_DATASOURCE_URL}
#spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
#spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver


#server.port=${PORT:8081}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Hibernate JDBC Batch — groups 500 INSERTs into 1 DB round-trip
# Critical for bulk import performance (10k rows in ~2 seconds instead of 30 seconds)
spring.jpa.properties.hibernate.jdbc.batch_size=500
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Server Port
#server.port=8081

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false

# Disable Open Session In View – forces all lazy loading to happen inside @Transactional
# This makes any accidental lazy load throw an exception immediately (dev-time safety net)
spring.jpa.open-in-view=false

# Enable virtual threads for all requests (Java 21 + Spring Boot 3.2+)
spring.threads.virtual.enabled=true

# JWT Configuration
jwt.secret=456d6f6e61204a575420536563726574204b65792044656d6f203132333435363738
jwt.expiration=86400000

