spring.application.name=Billing-System

# PostgreSQL DataSource
spring.datasource.url=jdbc:postgresql://localhost:5432/billing_db
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server Port
server.port=8080

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false

# Disable Open Session In View – forces all lazy loading to happen inside @Transactional
# This makes any accidental lazy load throw an exception immediately (dev-time safety net)
spring.jpa.open-in-view=false

# Enable virtual threads for all requests (Java 21 + Spring Boot 3.2+)
spring.threads.virtual.enabled=true

# ═══════════════════════════════════════════════════
# JWT Configuration
# ═══════════════════════════════════════════════════
jwt.secret=BillingSystem2026SuperSecretKeyThatIsAtLeast256BitsLong!!
jwt.expiration-ms=86400000

