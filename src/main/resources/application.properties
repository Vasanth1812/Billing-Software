spring.application.name=Billing-System

# PostgreSQL DataSource
spring.datasource.url=jdbc:postgresql://localhost:5000/billing_db
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server Port
server.port=8081

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false

# Disable Open Session In View – forces all lazy loading to happen inside @Transactional
# This makes any accidental lazy load throw an exception immediately (dev-time safety net)
spring.jpa.open-in-view=false

# Enable virtual threads for all requests (Java 21 + Spring Boot 3.2+)
spring.threads.virtual.enabled=true

# JWT Configuration
jwt.secret=456d6f6e61204a575420536563726574204b65792044656d6f203132333435363738
jwt.expiration=86400000

# Mail Configuration (Optional - for Forgot Password)
